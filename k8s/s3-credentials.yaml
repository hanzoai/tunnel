# DEPRECATED: use hanzo-s3 secret instead (infra/k8s/storage/hanzo-s3-secret.yaml)
#
# This secret is kept only for backward compatibility with any services still
# referencing the old s3-credentials secret name. New deployments MUST use
# the unified hanzo-s3 secret.
#
# To create the replacement:
#
#   export MINIO_PW=$(kubectl get secret minio-credentials -n hanzo \
#     -o jsonpath='{.data.MINIO_ROOT_PASSWORD}' | base64 -d)
#   kubectl create secret generic hanzo-s3 -n hanzo \
#     --from-literal=endpoint=http://minio:9000 \
#     --from-literal=external-endpoint=https://s3.hanzo.ai \
#     --from-literal=access-key=hanzo \
#     --from-literal=secret-key="$MINIO_PW" \
#     --from-literal=region=us-east-1
#
---
apiVersion: v1
kind: Secret
metadata:
  name: s3-credentials
  namespace: hanzo
  labels:
    app.kubernetes.io/part-of: hanzo-platform
  annotations:
    deprecated: "true"
    replacement: hanzo-s3
type: Opaque
stringData:
  S3_ACCESS_KEY: "PLACEHOLDER"
  S3_SECRET_KEY: "PLACEHOLDER"
